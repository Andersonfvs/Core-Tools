name: CoreTools Production & Article Automation Pipeline

on:
  push:
    branches:
      - main
  # Geracao de artigo por IA roda SOMENTE quando disparada manualmente
  # (Actions > Run workflow), permitindo revisao humana antes de publicar.
  # Cron automatico foi removido para evitar "scaled content abuse" (politica Google).
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Generate New Daily Article (If GEMINI_API_KEY exists)
        if: github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "🚀 Gerando artigo diário de 1000+ palavras com IA..."
            node scripts/generate-article.js || echo "Aviso: Falha ao gerar artigo por IA, mantendo artigos existentes."
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action Bot"
            git add src/data/articles.json
            git commit -m "chore(auto-article): publicar novo artigo diário [skip ci]" || echo "Sem novos artigos para comitar"
            git push origin main || echo "Aviso: Não foi possível fazer push no repositório, mas o deploy estático continuará normalmente."
          else
            echo "⚠️ GEMINI_API_KEY não configurada nos Secrets. Pulando geração automática."
          fi

      - name: Build Next.js Static Export
        env:
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          NEXT_PUBLIC_ADSENSE_PUB_ID: ${{ secrets.ADSENSE_PUB_ID }}
        run: npm run build

      - name: Deploy to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # FTP do servidor de arquivos srv725 (srv725.hstgr.io = 212.85.3.229), onde os
          # arquivos do site realmente vivem. Historico dos IPs errados:
          #  - 212.85.6.169: servidor antigo pre-migracao; FTP conectava mas gravava copia fantasma.
          #  - 2.57.91.36: IP so-web (nao aceita FTP: "Timeout control socket").
          # Se voltar a estagnar, reconferir: resolver srv725.hstgr.io e o IP web do site.
          server: 212.85.3.229
          username: u135751739
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          security: loose
          local-dir: ./out/
          # Docroot REAL do subdominio coretools.fvsynapse.com.br na Hostinger (site
          # adicionado como separado usa domains/<dominio>/public_html, NAO public_html/coretools).
          server-dir: ./domains/coretools.fvsynapse.com.br/public_html/
          # SEGURO: server-dir aponta para a pasta dedicada do CoreTools.
          # clean-slate apaga/recria APENAS o conteudo de coretools/ a cada deploy
          # (o WordPress em public_html/ NAO e afetado). Resolve o erro FTP 550
          # causado pela sincronizacao incremental quando muda o build id.
          dangerous-clean-slate: true
