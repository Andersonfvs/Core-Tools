name: CoreTools Production & Article Automation Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 11 * * *' # 08:00 BRT (11:00 UTC)
    - cron: '0 17 * * *' # 14:00 BRT (17:00 UTC)
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Generate New Daily Article (If GEMINI_API_KEY exists)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "🚀 Gerando artigo diário de 1000+ palavras com IA..."
            node scripts/generate-article.js || echo "Aviso: Falha ao gerar artigo por IA, mantendo artigos existentes."
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action Bot"
            git add src/data/articles.json
            git commit -m "chore(auto-article): publicar novo artigo diário [skip ci]" || echo "Sem novos artigos para comitar"
            git push origin main || echo "Aviso: Não foi possível fazer push no repositório, mas o deploy estático continuará normalmente."
          else
            echo "⚠️ GEMINI_API_KEY não configurada nos Secrets. Pulando geração automática."
          fi

      - name: Build Next.js Static Export
        run: npm run build

      - name: Deploy to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 212.85.6.169
          username: u135751739
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          security: loose
          local-dir: ./out/
          server-dir: ./public_html/coretools/
          dangerous-clean-slate: false
