name: CoreTools Production & Article Automation Pipeline

# ATENCAO: o deploy por FTP NAO alcanca a pasta que o site serve (defeito de
# configuracao da conta Hostinger, provado em 2026-07-20). Enquanto nao migrar
# para Cloudflare Pages OU criar uma conta FTP scoped ao docroot, o deploy roda
# em vao. Por isso removi o gatilho de push (nao adianta rodar a cada commit).
# Atualizacao real do site = upload manual do zip pelo file manager do hPanel.
on:
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Generate New Daily Article (If GEMINI_API_KEY exists)
        if: github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "🚀 Gerando artigo diário de 1000+ palavras com IA..."
            node scripts/generate-article.js || echo "Aviso: Falha ao gerar artigo por IA, mantendo artigos existentes."
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action Bot"
            git add src/data/articles.json
            git commit -m "chore(auto-article): publicar novo artigo diário [skip ci]" || echo "Sem novos artigos para comitar"
            git push origin main || echo "Aviso: Não foi possível fazer push no repositório, mas o deploy estático continuará normalmente."
          else
            echo "⚠️ GEMINI_API_KEY não configurada nos Secrets. Pulando geração automática."
          fi

      - name: Build Next.js Static Export
        env:
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          NEXT_PUBLIC_ADSENSE_PUB_ID: ${{ secrets.ADSENSE_PUB_ID }}
        run: npm run build

      - name: Deploy to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # FTP do servidor de arquivos srv725 (srv725.hstgr.io = 212.85.3.229), onde os
          # arquivos do site realmente vivem. Historico dos IPs errados:
          #  - 212.85.6.169: servidor antigo pre-migracao; FTP conectava mas gravava copia fantasma.
          #  - 2.57.91.36: IP so-web (nao aceita FTP: "Timeout control socket").
          # Se voltar a estagnar, reconferir: resolver srv725.hstgr.io e o IP web do site.
          server: 212.85.3.229
          username: u135751739
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          security: loose
          local-dir: ./out/
          # DOCROOT REAL do subdominio (provado por marcador em ftp-diagnose.js 2026-07-20):
          # coretools.fvsynapse.com.br foi criado como site separado -> serve de
          # domains/coretools.fvsynapse.com.br/public_html. As pastas coretools e
          # public_html/coretools sao copias-fantasma nao servidas. NAO mexer sem re-diagnosticar.
          server-dir: domains/coretools.fvsynapse.com.br/public_html/
          # clean-slate ligado: confirmado que grava na pasta certa (domains/.../public_html).
          # Resolve o 550 da sincronizacao incremental (tenta apagar build-hash antigo inexistente).
          # Seguro: so afeta o docroot dedicado do subdominio coretools.
          dangerous-clean-slate: true
